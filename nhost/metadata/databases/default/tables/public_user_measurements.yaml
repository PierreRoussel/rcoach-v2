table:
  name: user_measurements
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: user
    permission:
      columns:
        - user_id
        - sex
        - age
        - height_cm
        - waist_cm
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - sex
        - age
        - height_cm
        - waist_cm
update_permissions:
  - role: user
    permission:
      columns:
        - sex
        - age
        - height_cm
        - waist_cm
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
