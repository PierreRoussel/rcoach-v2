table:
  name: workout_templates
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: workout_template_exercises
    using:
      foreign_key_constraint_on:
        column: template_id
        table:
          name: workout_template_exercises
          schema: public
  - name: scheduled_sessions
    using:
      foreign_key_constraint_on:
        column: workout_template_id
        table:
          name: scheduled_sessions
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - name
        - created_at
        - updated_at
        - default_rest_seconds
        - source_workout_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - name
        - default_rest_seconds
        - source_workout_id
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - default_rest_seconds
        - source_workout_id
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
