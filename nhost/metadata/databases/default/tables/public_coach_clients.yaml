table:
  name: coach_clients
  schema: public
object_relationships:
  - name: coach
    using:
      foreign_key_constraint_on: coach_id
  - name: athlete
    using:
      foreign_key_constraint_on: athlete_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - coach_id
        - athlete_id
        - invited_email
        - status
        - created_at
      filter:
        _or:
          - coach_id:
              _eq: X-Hasura-User-Id
          - athlete_id:
              _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        coach_id:
          _eq: X-Hasura-User-Id
      set:
        coach_id: x-hasura-User-Id
      columns:
        - athlete_id
        - invited_email
        - status
update_permissions:
  - role: user
    permission:
      columns:
        - status
      filter:
        coach_id:
          _eq: X-Hasura-User-Id
      check:
        coach_id:
          _eq: X-Hasura-User-Id
