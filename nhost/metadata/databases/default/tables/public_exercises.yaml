table:
  name: exercises
  schema: public
object_relationships:
  - name: creator
    using:
      foreign_key_constraint_on: created_by
array_relationships:
  - name: workout_exercises
    using:
      foreign_key_constraint_on:
        column: exercise_id
        table:
          name: workout_exercises
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - muscle_group
        - equipment
        - created_by
        - is_public
        - created_at
        - tracking_mode
      filter:
        _or:
          - is_public:
              _eq: true
          - created_by:
              _eq: X-Hasura-User-Id
  - role: public
    permission:
      columns:
        - id
        - name
        - muscle_group
        - equipment
      filter:
        workout_exercises:
          workout:
            share_token:
              _is_null: false
insert_permissions:
  - role: user
    permission:
      check:
        created_by:
          _eq: X-Hasura-User-Id
      set:
        created_by: x-hasura-User-Id
      columns:
        - name
        - muscle_group
        - equipment
        - is_public
        - tracking_mode
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - muscle_group
        - equipment
        - is_public
        - tracking_mode
      filter:
        created_by:
          _eq: X-Hasura-User-Id
      check:
        created_by:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        created_by:
          _eq: X-Hasura-User-Id
