table:
  name: exercises
  schema: public
object_relationships:
  - name: creator
    using:
      foreign_key_constraint_on: created_by
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - muscle_group
        - equipment
        - created_by
        - is_public
        - created_at
      filter:
        _or:
          - is_public:
              _eq: true
          - created_by:
              _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        created_by:
          _eq: X-Hasura-User-Id
      set:
        created_by: x-hasura-User-Id
      columns:
        - name
        - muscle_group
        - equipment
        - is_public
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - muscle_group
        - equipment
        - is_public
      filter:
        created_by:
          _eq: X-Hasura-User-Id
      check:
        created_by:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        created_by:
          _eq: X-Hasura-User-Id
