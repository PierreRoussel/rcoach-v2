table:
  name: meal_log_entries
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: food
    using:
      foreign_key_constraint_on: food_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - logged_date
        - meal_type
        - food_id
        - quantity_g
        - servings
        - calories
        - carbs_g
        - protein_g
        - fat_g
        - created_at
        - updated_at
      filter:
        _or:
          - user_id:
              _eq: X-Hasura-User-Id
          - user:
              friendships_as_addressee:
                requester_id:
                  _eq: X-Hasura-User-Id
                status:
                  _eq: accepted
          - user:
              friendships_as_requester:
                addressee_id:
                  _eq: X-Hasura-User-Id
                status:
                  _eq: accepted
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - logged_date
        - meal_type
        - food_id
        - quantity_g
        - servings
        - calories
        - carbs_g
        - protein_g
        - fat_g
update_permissions:
  - role: user
    permission:
      columns:
        - meal_type
        - quantity_g
        - servings
        - calories
        - carbs_g
        - protein_g
        - fat_g
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
