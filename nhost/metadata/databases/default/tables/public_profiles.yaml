table:
  name: profiles
  schema: public
array_relationships:
  - name: coach_clients_as_coach
    using:
      foreign_key_constraint_on:
        column: coach_id
        table:
          name: coach_clients
          schema: public
  - name: coach_clients_as_athlete
    using:
      foreign_key_constraint_on:
        column: athlete_id
        table:
          name: coach_clients
          schema: public
  - name: workouts
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: workouts
          schema: public
  - name: programs
    using:
      foreign_key_constraint_on:
        column: coach_id
        table:
          name: programs
          schema: public
  - name: exercises
    using:
      foreign_key_constraint_on:
        column: created_by
        table:
          name: exercises
          schema: public
  - name: workout_templates
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: workout_templates
          schema: public
  - name: scheduled_sessions
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: scheduled_sessions
          schema: public
  - name: friendships_as_requester
    using:
      foreign_key_constraint_on:
        column: requester_id
        table:
          name: friendships
          schema: public
  - name: friendships_as_addressee
    using:
      foreign_key_constraint_on:
        column: addressee_id
        table:
          name: friendships
          schema: public
  - name: meal_log_entries
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: meal_log_entries
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - display_name
        - avatar_url
        - role
        - unit_system
        - rpe_enabled
        - exercise_locale
        - created_at
        - friend_code
        - onboarding_completed_at
        - is_premium
        - goal_coaching_reminders_enabled
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - coach_clients_as_athlete:
              coach_id:
                _eq: X-Hasura-User-Id
              status:
                _eq: active
          - friendships_as_addressee:
              requester_id:
                _eq: X-Hasura-User-Id
              status:
                _eq: accepted
          - friendships_as_requester:
              addressee_id:
                _eq: X-Hasura-User-Id
              status:
                _eq: accepted
          - friend_code:
              _is_null: false
  - role: public
    permission:
      columns:
        - id
        - display_name
      filter:
        workouts:
          share_token:
            _is_null: false
update_permissions:
  - role: user
    permission:
      columns:
        - display_name
        - avatar_url
        - role
        - unit_system
        - rpe_enabled
        - exercise_locale
        - onboarding_completed_at
        - goal_coaching_reminders_enabled
      filter:
        id:
          _eq: X-Hasura-User-Id
      check:
        id:
          _eq: X-Hasura-User-Id
