table:
  name: profiles
  schema: public
array_relationships:
  - name: coach_clients_as_coach
    using:
      foreign_key_constraint_on:
        column: coach_id
        table:
          name: coach_clients
          schema: public
  - name: coach_clients_as_athlete
    using:
      foreign_key_constraint_on:
        column: athlete_id
        table:
          name: coach_clients
          schema: public
  - name: workouts
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: workouts
          schema: public
  - name: programs
    using:
      foreign_key_constraint_on:
        column: coach_id
        table:
          name: programs
          schema: public
  - name: exercises
    using:
      foreign_key_constraint_on:
        column: created_by
        table:
          name: exercises
          schema: public
  - name: workout_templates
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: workout_templates
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - display_name
        - avatar_url
        - role
        - unit_system
        - rpe_enabled
        - created_at
      filter:
        id:
          _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - display_name
        - avatar_url
        - role
        - unit_system
        - rpe_enabled
      filter:
        id:
          _eq: X-Hasura-User-Id
      check:
        id:
          _eq: X-Hasura-User-Id
