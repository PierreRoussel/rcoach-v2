table:
  name: friend_motivations
  schema: public
object_relationships:
  - name: sender
    using:
      foreign_key_constraint_on: sender_id
  - name: recipient
    using:
      foreign_key_constraint_on: recipient_id
select_permissions:
  - role: user
    permission:
      allow_aggregations: true
      columns:
        - id
        - sender_id
        - recipient_id
        - emoji
        - message
        - preset_key
        - read_at
        - hearted_at
        - reply_message
        - created_at
      filter:
        _or:
          - sender_id:
              _eq: X-Hasura-User-Id
          - recipient_id:
              _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - sender_id:
              _eq: X-Hasura-User-Id
          - _exists:
              _table:
                name: friendships
                schema: public
              _where:
                _and:
                  - status:
                      _eq: accepted
                  - _or:
                      - _and:
                          - requester_id:
                              _eq: X-Hasura-User-Id
                          - addressee_id:
                              _eq: $recipient_id
                      - _and:
                          - addressee_id:
                              _eq: X-Hasura-User-Id
                          - requester_id:
                              _eq: $recipient_id
      set:
        sender_id: x-hasura-User-Id
      columns:
        - recipient_id
        - emoji
        - message
        - preset_key
update_permissions:
  - role: user
    permission:
      columns:
        - read_at
        - hearted_at
        - reply_message
      filter:
        recipient_id:
          _eq: X-Hasura-User-Id
      check:
        recipient_id:
          _eq: X-Hasura-User-Id
