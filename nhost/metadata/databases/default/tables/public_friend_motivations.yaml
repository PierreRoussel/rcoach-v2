table:
  name: friend_motivations
  schema: public
object_relationships:
  - name: sender
    using:
      foreign_key_constraint_on: sender_id
  - name: recipient
    using:
      foreign_key_constraint_on: recipient_id
select_permissions:
  - role: user
    permission:
      allow_aggregations: true
      columns:
        - id
        - sender_id
        - recipient_id
        - emoji
        - message
        - preset_key
        - read_at
        - hearted_at
        - reply_message
        - sender_reply_seen_at
        - created_at
      filter:
        _or:
          - sender_id:
              _eq: X-Hasura-User-Id
          - recipient_id:
              _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        sender_id:
          _eq: X-Hasura-User-Id
      set:
        sender_id: x-hasura-User-Id
      columns:
        - recipient_id
        - emoji
        - message
        - preset_key
update_permissions:
  - role: user
    permission:
      columns:
        - read_at
        - hearted_at
        - reply_message
        - sender_reply_seen_at
      filter:
        _or:
          - recipient_id:
              _eq: X-Hasura-User-Id
          - sender_id:
              _eq: X-Hasura-User-Id
      check:
        _or:
          - recipient_id:
              _eq: X-Hasura-User-Id
          - sender_id:
              _eq: X-Hasura-User-Id
