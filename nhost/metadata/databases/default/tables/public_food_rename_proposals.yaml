table:
  name: food_rename_proposals
  schema: public
object_relationships:
  - name: food
    using:
      foreign_key_constraint_on: food_id
  - name: proposer
    using:
      foreign_key_constraint_on: proposed_by
  - name: reviewer
    using:
      foreign_key_constraint_on: reviewed_by
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - food_id
        - proposed_name
        - proposed_by
        - status
        - reviewed_by
        - reviewed_at
        - created_at
        - updated_at
      filter:
        proposed_by:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: user
    permission:
      check:
        proposed_by:
          _eq: X-Hasura-User-Id
      set:
        proposed_by: x-hasura-User-Id
        status: pending
      columns:
        - food_id
        - proposed_name
