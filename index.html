<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F5FB" />
    <script>
      ;(function syncInitialPwaChromeColor() {
        try {
          var stored = JSON.parse(window.localStorage.getItem('rcoach-theme') || '{}')
          var prefersDark =
            stored.colorModePreference === 'dark' ||
            (stored.colorModePreference === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches) ||
            stored.colorMode === 'dark'
          var themeId = stored.themeId === 'pro' ? 'pro' : 'sports-candy'
          var background =
            themeId === 'pro' ? '#0D1B2E' : prefersDark ? '#18143A' : '#F7F5FB'
          var themeColorMeta = document.querySelector('meta[name="theme-color"]')
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', background)
          }
          var statusBarMeta = document.querySelector(
            'meta[name="apple-mobile-web-app-status-bar-style"]',
          )
          if (statusBarMeta) {
            statusBarMeta.setAttribute(
              'content',
              prefersDark || themeId === 'pro' ? 'black-translucent' : 'default',
            )
          }
        } catch (_error) {
          /* ignore malformed theme preferences */
        }
      })()
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RCoach" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RCoach" />
    <meta property="og:title" content="RCoach — Coach sportif & nutrition" />
    <meta
      property="og:description"
      content="Application musculation et nutrition : séances, macros, objectifs et communauté. Essayez RCoach gratuitement."
    />
    <meta property="og:image" content="/og-share-default.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>RCoach — Application musculation & nutrition</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
