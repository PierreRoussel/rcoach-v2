query ListMyBadges($userId: uuid!) {
  user_badges(
    where: { user_id: { _eq: $userId } }
    order_by: { unlocked_at: desc }
  ) {
    id
    user_id
    badge_key
    unlocked_at
  }
}

mutation InsertUserBadge($badgeKey: String!) {
  insert_user_badges_one(
    object: { badge_key: $badgeKey }
    on_conflict: {
      constraint: user_badges_user_id_badge_key_key
      update_columns: []
    }
  ) {
    id
    user_id
    badge_key
    unlocked_at
  }
}

query ListActiveBadgeDefinitions {
  badge_definitions(
    where: { is_active: { _eq: true } }
    order_by: [{ sort_order: asc }, { key: asc }]
  ) {
    key
    label
    description
    category
    tier
    icon_name
    rule_type
    rule_threshold
    is_active
    sort_order
    created_at
    updated_at
  }
}

query ListAllBadgeDefinitions {
  badge_definitions(order_by: [{ sort_order: asc }, { key: asc }]) {
    key
    label
    description
    category
    tier
    icon_name
    rule_type
    rule_threshold
    is_active
    sort_order
    created_at
    updated_at
  }
}

mutation InsertBadgeDefinition($object: badge_definitions_insert_input!) {
  insert_badge_definitions_one(object: $object) {
    key
    label
    description
    category
    tier
    icon_name
    rule_type
    rule_threshold
    is_active
    sort_order
    created_at
    updated_at
  }
}

mutation UpdateBadgeDefinition(
  $key: String!
  $changes: badge_definitions_set_input!
) {
  update_badge_definitions_by_pk(pk_columns: { key: $key }, _set: $changes) {
    key
    label
    description
    category
    tier
    icon_name
    rule_type
    rule_threshold
    is_active
    sort_order
    created_at
    updated_at
  }
}

mutation DeleteBadgeDefinition($key: String!) {
  delete_badge_definitions_by_pk(key: $key) {
    key
  }
}

query GetFriendProfileSummary(
  $friendId: uuid!
  $workoutLimit: Int!
  $workoutSince: timestamptz!
) {
  profiles_by_pk(id: $friendId) {
    id
    display_name
    avatar_url
    is_premium
    user_badges(order_by: { unlocked_at: desc }) {
      id
      user_id
      badge_key
      unlocked_at
    }
    workouts(
      where: {
        ended_at: { _is_null: false }
        started_at: { _gte: $workoutSince }
      }
      order_by: { started_at: desc }
      limit: $workoutLimit
    ) {
      id
      title
      started_at
      ended_at
      share_token
      workout_exercises(order_by: { sort_order: asc }) {
        id
        exercise {
          id
          name
          name_fr
          muscle_group
          equipment
        }
        sets(order_by: { set_index: asc }) {
          set_index
          weight_kg
          reps
          set_type
          rpe
        }
      }
    }
  }
}

query GetFriendProfile(
  $friendId: uuid!
  $workoutLimit: Int!
  $mealSince: date!
  $workoutSince: timestamptz!
) {
  profiles_by_pk(id: $friendId) {
    id
    display_name
    avatar_url
    is_premium
    user_badges(order_by: { unlocked_at: desc }) {
      id
      user_id
      badge_key
      unlocked_at
    }
    workouts(
      where: {
        ended_at: { _is_null: false }
        started_at: { _gte: $workoutSince }
      }
      order_by: { started_at: desc }
      limit: $workoutLimit
    ) {
      id
      title
      started_at
      ended_at
      share_token
      workout_exercises(order_by: { sort_order: asc }) {
        id
        exercise {
          id
          name
          name_fr
          muscle_group
          equipment
        }
        sets(order_by: { set_index: asc }) {
          set_index
          weight_kg
          reps
          set_type
          rpe
        }
      }
    }
    meal_log_entries(
      where: { logged_date: { _gte: $mealSince } }
      order_by: { logged_date: desc }
    ) {
      logged_date
      calories
    }
  }
}
