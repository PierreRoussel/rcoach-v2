query ListPublicExercises {
  exercises(
    where: { is_public: { _eq: true } }
    order_by: { name: asc }
  ) {
    id
    name
    muscle_group
    equipment
    is_public
  }
}

mutation InsertWorkout($object: workouts_insert_input!) {
  insert_workouts_one(object: $object) {
    id
    title
    started_at
    workout_exercises {
      id
      exercise {
        name
      }
      sets {
        id
        set_index
        weight_kg
        reps
      }
    }
  }
}
