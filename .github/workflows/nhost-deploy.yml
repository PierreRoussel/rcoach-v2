# Requires repository secret NHOST_PAT (Nhost Dashboard → Account → Personal Access Tokens)
# https://docs.nhost.io/platform/cloud/deployments

name: Deploy Nhost

on:
  push:
    branches: [main]
    paths:
      - 'nhost/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: nhost-actions/install-nhost-cli@v1
      - uses: nhost-actions/authenticate@v1
        with:
          pat: ${{ secrets.NHOST_PAT }}
      - uses: nhost-actions/deploy@v1
        with:
          subdomain: knnxqdyuwqvdrupkbvgr
